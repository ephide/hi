<!DOCTYPE html>
<html>
<head>
<title>Ephide Login</title>

<style>
body{
background:#0f172a;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
}

.login-box{
background:#1e293b;
padding:40px;
border-radius:10px;
width:300px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:6px;
}

button{
width:100%;
padding:10px;
background:#3b82f6;
border:none;
border-radius:6px;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#2563eb;
}
</style>
</head>

<body>

<div class="login-box">
<h2>Ephide Login</h2>

<input type="text" placeholder="Username">
<input type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="message"></p>
</div>

<script>
function login(){
let user = document.querySelectorAll("input")[0].value
let pass = document.querySelectorAll("input")[1].value

if(user === "admin" && pass === "1234"){
document.getElementById("message").innerText = "Login successful"
}
else{
document.getElementById("message").innerText = "Wrong username or password"
}
}
</script>

</body>
</html>
